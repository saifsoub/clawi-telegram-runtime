<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawi - Connections</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="phone-frame">
  <div class="topbar">
    <a href="index.html" class="topbar-back">&#8592;</a>
    <div class="topbar-title">Connections</div>
    <div class="topbar-right"><div class="topbar-icon">+</div></div>
  </div>
  <div class="content">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:18px;font-weight:800">Connect Your Tools</div>
      <div style="font-size:13px;color:var(--muted)">Link services so your Clawis can help you</div>
    </div>

    <div class="section-title" style="margin-top:0;font-size:16px">Available</div>
    <div class="tool-row">
      <div class="tool-info">
        <div class="tool-icon" style="background:rgba(92,184,255,.12)">&#128231;</div>
        <div>
          <div class="tool-name">Gmail</div>
          <div style="font-size:10px;color:var(--muted)">Read, send, organize email</div>
        </div>
      </div>
      <a href="gmail-connect.html" class="btn btn-sm btn-soft">Connect</a>
    </div>
    <div class="tool-row">
      <div class="tool-info">
        <div class="tool-icon" style="background:rgba(92,216,153,.12)">&#128172;</div>
        <div>
          <div class="tool-name">Telegram</div>
          <div style="font-size:10px;color:var(--muted)">Chat with your Clawis</div>
        </div>
      </div>
      <a href="telegram-connect.html" class="btn btn-sm btn-soft">Connect</a>
    </div>
    <div class="tool-row">
      <div class="tool-info">
        <div class="tool-icon" style="background:rgba(255,196,110,.12)">&#128197;</div>
        <div>
          <div class="tool-name">Google Calendar</div>
          <div style="font-size:10px;color:var(--muted)">Schedule and reminders</div>
        </div>
      </div>
      <div class="btn btn-sm btn-soft" style="opacity:.6">Soon</div>
    </div>
    <div class="tool-row">
      <div class="tool-info">
        <div class="tool-icon" style="background:rgba(160,128,255,.12)">&#128193;</div>
        <div>
          <div class="tool-name">Notion</div>
          <div style="font-size:10px;color:var(--muted)">Notes and databases</div>
        </div>
      </div>
      <div class="btn btn-sm btn-soft" style="opacity:.6">Soon</div>
    </div>
  </div>
  <div class="bottomnav">
    <a href="index.html" class="nav-item"><i>C</i>Clawis</a>
    <a href="workflow.html" class="nav-item"><i>W</i>Workflows</a>
    <a href="tools.html" class="nav-item active"><i>T</i>Tools</a>
    <a href="settings.html" class="nav-item"><i>P</i>Profile</a>
  </div>
</div>
</body>
</html>
