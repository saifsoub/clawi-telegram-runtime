        <ellipse cx="90" cy="128" rx="55" ry="14" fill="#8f4dff" opacity=".3" filter="url(#ginc)"/>

    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:18px;font-weight:800">Create new Clawi</div>

        <div class="tool-info">
          <div class="tool-icon" style="background:linear-gradient(135deg,#22d7ff,#8f4dff);font-size:14px">&#129302;</div>
          <div><div class="tool-name">Research Clawi</div><div style="font-size:10px;color:var(--muted)">v1.2</div></div>
        </div>
        <div style="font-size:14px;color:var(--muted)">&#9998;</div>
      </div>
      <div class="tool-row">
        <div class="tool-info">

        <div class="tool-info">
